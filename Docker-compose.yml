version: "3"

services:
  db:
    image: postgres:15-alpine
    restart: always
    ports:
      - "5432:5432"
    shm_size: 128mb
    environment:
      POSTGRES_DB: "test"
      POSTGRES_USER: "testUser"
      POSTGRES_PASSWORD: "123"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d:ro


  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_URL: "postgres://testUser:123@db:5432/test?sslmode=disable"
      SERVER_ADDRESS: ":8080"
      AUTH_TOKEN: "JASHDFVBAKJHSVBFKJHBA98"
    depends_on:
      - db